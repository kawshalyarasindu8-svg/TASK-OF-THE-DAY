<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>

    <!-- CSS Styling Section -->
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            background: white;
            width: 300px;
            text-align: center;
            padding: 20px;
            border-radius: 15px; /* Rounded corners */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* Shadow */
        }

        .profile-img{
            width: 100px;
            height: 100px;
            background: #ddd;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        h2{
            margin: 5px;
        }

        p{
            color: #555;
        }
    </style>
</head>

<body>

    <!-- div structure -->
    <div class="card">

        <div class="profile-img">
            Image
        </div>

        <h2>Rasindu Kawshalya</h2>
        <h4>Software Engineering</h4>

        <p>
            A passionate student learning web development and programming.
        </p>

    </div>

</body>
</html>
